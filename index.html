<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linea Map - Taxis Colectivos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="mapa.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="Logo.jpeg" alt="Logo Linea Map" class="logo-img">
            <h2 class="brand-title">Linea Map</h2>
            <p>Directorio de Taxis Colectivos</p>
            <button onclick="entrarInvitado()" class="btn-invitado">Entrar al Mapa</button>
        </div>
    </div>

    <header id="top-bar" class="top-bar hidden-ui">
        <button class="icon-btn" onclick="toggleMenu()" title="Menú">☰</button>
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="global-search" placeholder="Buscar dirección..." autocomplete="off" oninput="manejarInputBusqueda()">
            <ul id="search-suggestions" class="suggestions-list"></ul>
        </div>
        <button class="icon-btn" onclick="verFavoritos()" title="Favoritos">⭐</button>
        <button id="btn-theme" class="icon-btn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Directorio de Líneas</h3>
            <button class="close-sidebar" onclick="toggleMenu()">✕</button>
        </div>
        
        <div class="sidebar-tabs">
            <button class="tab-btn active" id="tab-lineas" onclick="switchTab('lineas')">Todas las Líneas</button>
            <button class="tab-btn" id="tab-favs" onclick="switchTab('favs')">Mis Favoritos</button>
        </div>

        <div class="sidebar-content" id="sidebar-lineas-content">
            </div>
        <div class="sidebar-content hidden" id="sidebar-favs-content">
            <p style="text-align: center; color: #888; margin-top: 20px;">Tus paraderos guardados aparecerán aquí.</p>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>
    <div id="map"></div>

    <button onclick="centrarEnUsuario()" class="btn-locate hidden-ui" title="Mi ubicación">🎯</button>

    <div id="bottom-sheet" class="bottom-sheet hidden">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-header">
            <button id="btn-star-paradero" class="icon-btn star-btn" onclick="toggleParaderoFavorito()">☆</button>
            <div class="title-container">
                <h3 id="sheet-title">Selecciona un paradero</h3>
                <p id="sheet-subtitle">Toca un autito en el mapa</p>
            </div>
            <button class="close-sheet-btn" onclick="cerrarBottomSheet()">✕</button>
        </div>
        
        <div class="sheet-body">
            <p class="section-label">Líneas y destinos desde aquí:</p>
            <div id="sheet-lines" class="destination-list-container">
                </div>
        </div>
    </div>

    <script src="mapa.js"></script>
</body>
</html>
